<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Primer izgleda sajta na telefonu">
  <defs>
    <linearGradient id="bgMob" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2a2a" stop-opacity=".35"/>
      <stop offset="1" stop-color="#ff6a00" stop-opacity=".30"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#0b0d12"/>
  <rect x="0" y="0" width="1200" height="800" fill="url(#bgMob)" opacity=".45"/>

  <!-- Telefon -->
  <g filter="url(#shadow3)">
    <rect x="440" y="80" width="320" height="640" rx="50" fill="rgba(0,0,0,.85)" stroke="rgba(255,255,255,.22)" stroke-width="3"/>
    <rect x="500" y="120" width="200" height="8" rx="4" fill="rgba(255,255,255,.35)"/>
    <circle cx="600" cy="736" r="22" fill="rgba(255,255,255,.15)"/>

    <!-- Ekran -->
    <rect x="470" y="150" width="260" height="560" rx="32" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.14)"/>

    <!-- Mobilna hero sekcija -->
    <rect x="485" y="165" width="230" height="140" rx="24" fill="rgba(255,255,255,.16)"/>
    <rect x="500" y="185" width="180" height="22" rx="11" fill="rgba(0,0,0,.50)"/>
    <rect x="500" y="220" width="140" height="16" rx="8" fill="rgba(0,0,0,.35)"/>

    <!-- Tekst ispod -->
    <rect x="485" y="325" width="190" height="14" rx="7" fill="rgba(255,255,255,.35)"/>
    <rect x="485" y="350" width="170" height="14" rx="7" fill="rgba(255,255,255,.30)"/>

    <!-- Dugme -->
    <rect x="485" y="380" width="130" height="34" rx="14" fill="rgba(255,255,255,.90)"/>

    <!-- Joa sekcija -->
    <rect x="485" y="435" width="230" height="70" rx="18" fill="rgba(255,255,255,.10)"/>
    <rect x="485" y="520" width="230" height="70" rx="18" fill="rgba(255,255,255,.10)"/>
    <rect x="485" y="605" width="230" height="70" rx="18" fill="rgba(255,255,255,.10)"/>
  </g>
</svg>
