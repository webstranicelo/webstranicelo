<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Primer poetne sekcije sajta">
  <defs>
    <linearGradient id="bgHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2a2a" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ff6a00" stop-opacity=".40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#0b0d12"/>
  <rect x="0" y="0" width="1200" height="380" fill="url(#bgHero)"/>

  <!-- Navigacija -->
  <g fill="rgba(255,255,255,.85)">
    <rect x="80" y="60" width="1040" height="64" rx="18" fill="rgba(0,0,0,.35)" stroke="rgba(255,255,255,.18)"/>
    <circle cx="120" cy="92" r="18" fill="rgba(255,255,255,.18)"/>
    <rect x="164" y="80" width="140" height="24" rx="12" fill="rgba(255,255,255,.28)"/>
    <rect x="360" y="82" width="90" height="20" rx="10" fill="rgba(255,255,255,.20)"/>
    <rect x="470" y="82" width="90" height="20" rx="10" fill="rgba(255,255,255,.18)"/>
    <rect x="580" y="82" width="90" height="20" rx="10" fill="rgba(255,255,255,.16)"/>
  </g>

  <!-- Blok sa naslovom i tekstom -->
  <g filter="url(#shadow)">
    <rect x="120" y="180" width="460" height="360" rx="26" fill="rgba(0,0,0,.65)" stroke="rgba(255,255,255,.16)"/>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="150" y="220" width="150" height="26" rx="13" fill="rgba(255,255,255,.16)"/>

    <rect x="150" y="270" width="320" height="38" rx="12" fill="rgba(255,255,255,.92)"/>
    <rect x="150" y="320" width="260" height="24" rx="12" fill="rgba(255,255,255,.75)"/>

    <rect x="150" y="370" width="290" height="14" rx="7" fill="rgba(255,255,255,.40)"/>
    <rect x="150" y="395" width="260" height="14" rx="7" fill="rgba(255,255,255,.32)"/>
    <rect x="150" y="420" width="220" height="14" rx="7" fill="rgba(255,255,255,.26)"/>

    <rect x="150" y="460" width="150" height="40" rx="14" fill="#ffffff"/>
    <rect x="316" y="460" width="150" height="40" rx="14" fill="rgba(0,0,0,.0)" stroke="rgba(255,255,255,.55)"/>
  </g>

  <!-- Ilustracija slike sa desne strane -->
  <g filter="url(#shadow)">
    <rect x="640" y="180" width="440" height="360" rx="26" fill="rgba(0,0,0,.65)" stroke="rgba(255,255,255,.16)"/>
    <rect x="660" y="200" width="400" height="240" rx="20" fill="rgba(255,255,255,.08)"/>
    <rect x="680" y="220" width="360" height="200" rx="18" fill="rgba(255,255,255,.16)"/>
    <rect x="660" y="460" width="180" height="18" rx="9" fill="rgba(255,255,255,.30)"/>
    <rect x="660" y="488" width="230" height="12" rx="6" fill="rgba(255,255,255,.20)"/>
  </g>
</svg>
